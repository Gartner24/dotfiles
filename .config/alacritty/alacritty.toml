# ╔══════════════════════════════════════╗
# ║     Alacritty — Gruvbox Dark Hard    ║
# ╚══════════════════════════════════════╝

[terminal.shell]
program = "/bin/zsh"
args    = []

# ── Window ────────────────────────────────────────────────────────────────────
[window]
decorations        = "none"
opacity            = 0.93
dynamic_padding    = false
resize_increments  = false

[window.padding]
x = 0
y = 0

# ── Font ──────────────────────────────────────────────────────────────────────
[font]
size = 12.0

[font.normal]
family = "Hack Nerd Font Mono"
style  = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style  = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style  = "Italic"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style  = "Bold Italic"

[font.offset]
x = 0
y = 1          # slight line-height breathing room

[font.glyph_offset]
x = 0
y = 0

# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
unfocused_hollow = true
# milliseconds between blinks
blink_interval = 600

[cursor.style]
shape   = "Block"    # Block | Underline | Beam
blinking = "On"

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Selection ─────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard    = false
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ── Colors — Gruvbox Dark Hard ────────────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "0x1d2021"   # hard dark
foreground = "0xebdbb2"   # light cream

[colors.cursor]
text   = "0x1d2021"
cursor = "0xd5c4a1"       # warm cursor glow

[colors.vi_mode_cursor]
text   = "0x1d2021"
cursor = "0xfabd2f"       # yellow highlight in vi mode

[colors.selection]
text       = "0x1d2021"
background = "0xd5c4a1"

[colors.normal]
black   = "0x282828"
red     = "0xcc241d"
green   = "0x98971a"
yellow  = "0xd79921"
blue    = "0x458588"
magenta = "0xb16286"
cyan    = "0x689d6a"
white   = "0xa89984"

[colors.bright]
black   = "0x928374"
red     = "0xfb4934"
green   = "0xb8bb26"
yellow  = "0xfabd2f"
blue    = "0x83a598"
magenta = "0xd3869b"
cyan    = "0x8ec07c"
white   = "0xebdbb2"

[colors.footer_bar]
background = "0x1d2021"
foreground = "0xa89984"

# ── Keybindings ───────────────────────────────────────────────────────────────
[[keyboard.bindings]]
key    = "PageUp"
mods   = "Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key    = "PageDown"
mods   = "Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key    = "Up"
mods   = "Control"
action = "ScrollLineUp"

[[keyboard.bindings]]
key    = "Down"
mods   = "Control"
action = "ScrollLineDown"

[[keyboard.bindings]]
key    = "K"
mods   = "Control|Shift"
action = "ClearHistory"

[[keyboard.bindings]]
key    = "C"
mods   = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key    = "V"
mods   = "Control|Shift"
action = "Paste"
