# ──────────────────────────────────────────────
#  Base settings
# ──────────────────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'
set -g mouse on
set -g mode-keys vi
set -g default-shell /bin/zsh
set -g allow-passthrough on

# ──────────────────────────────────────────────
#  Vi copy bindings
# ──────────────────────────────────────────────
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ──────────────────────────────────────────────
#  General UX improvements
# ──────────────────────────────────────────────
set -g history-limit 50000
set -g display-time 1500
set -sg escape-time 0            # instant Esc in Neovim
set -g focus-events on
set -g renumber-windows on       # close a window → no gaps

# ──────────────────────────────────────────────
#  Purple palette
#  bg_dark   #1a0f2e   deep aubergine
#  bg_mid    #2d1b69   medium violet
#  purple    #7c3aed   vivid purple
#  lavender  #a78bfa   soft lavender
#  lilac     #ddd6fe   pale lilac
#  accent    #e879f9   magenta pop
#  fg        #f5f0ff   near-white
#  muted     #6d6a7a   grey-purple
# ──────────────────────────────────────────────

# ──────────────────────────────────────────────
#  Pane borders
# ──────────────────────────────────────────────
set -g pane-border-style          "fg=#2d1b69"
set -g pane-active-border-style   "fg=#7c3aed"

# ──────────────────────────────────────────────
#  Message / command-prompt bar
# ──────────────────────────────────────────────
set -g message-style          "fg=#f5f0ff,bg=#2d1b69,bold"
set -g message-command-style  "fg=#e879f9,bg=#1a0f2e,bold"

# ──────────────────────────────────────────────
#  Copy-mode highlight
# ──────────────────────────────────────────────
set -g mode-style "fg=#1a0f2e,bg=#a78bfa,bold"

# ──────────────────────────────────────────────
#  Status bar — global
# ──────────────────────────────────────────────
set -g status                 on
set -g status-position        bottom
set -g status-interval        5
set -g status-justify         left
set -g status-style           "fg=#a78bfa,bg=#1a0f2e"

# ──────────────────────────────────────────────
#  Status LEFT  ·  ▌ session_name ▌
# ──────────────────────────────────────────────
set -g status-left-length 28
set -g status-left "\
#[fg=#1a0f2e,bg=#7c3aed,bold] 󰆙 #S \
#[fg=#7c3aed,bg=#2d1b69]▓░\
#[fg=#a78bfa,bg=#2d1b69] #I:#P \
#[fg=#2d1b69,bg=#1a0f2e]▓░\
#[default] "

# ──────────────────────────────────────────────
#  Status RIGHT  ·  date / time / host
# ──────────────────────────────────────────────
set -g status-right-length 52
set -g status-right "\
#[fg=#2d1b69,bg=#1a0f2e]░▓\
#[fg=#a78bfa,bg=#2d1b69] %a %d %b \
#[fg=#7c3aed,bg=#2d1b69]│\
#[fg=#ddd6fe,bg=#2d1b69,bold] %H:%M \
#[fg=#7c3aed,bg=#2d1b69]░▓\
#[fg=#1a0f2e,bg=#7c3aed,bold]  #h "

# ──────────────────────────────────────────────
#  Window status  (inactive)
# ──────────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format "\
#[fg=#1a0f2e,bg=#1a0f2e] \
#[fg=#6d6a7a,bg=#1a0f2e] #I #[fg=#6d6a7a]#W#{?window_zoomed_flag, 󰍉,} \
#[fg=#1a0f2e,bg=#1a0f2e] "

# ──────────────────────────────────────────────
#  Window status  (active)
# ──────────────────────────────────────────────
set -g window-status-current-format "\
#[fg=#1a0f2e,bg=#7c3aed]▓\
#[fg=#f5f0ff,bg=#7c3aed,bold] #I \
#[fg=#e879f9,bg=#7c3aed]│\
#[fg=#f5f0ff,bg=#7c3aed,bold] #W#{?window_zoomed_flag,  󰍉,} \
#[fg=#7c3aed,bg=#1a0f2e]▓#[default]"

# ──────────────────────────────────────────────
#  Window status bell / activity
# ──────────────────────────────────────────────
set -g window-status-bell-style    "fg=#e879f9,bg=#1a0f2e,bold"
set -g window-status-activity-style "fg=#a78bfa,bg=#1a0f2e"

# ──────────────────────────────────────────────
#  Handy keybinds
# ──────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "  Config reloaded!"

# Split with current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with shift-arrows
bind -r S-Up    resize-pane -U 3
bind -r S-Down  resize-pane -D 3
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5
